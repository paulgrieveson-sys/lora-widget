const STORAGE_KEY = 'lora_jdcm_session';

function saveSession() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      conversationHistory,
      collectedData,
      ghlContactId,
      questionsAnswered,
      savedAt: Date.now()
    }));
  } catch(e) { console.log('Session save failed:', e); }
}

function loadSession() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return null;
    const session = JSON.parse(saved);
    if (Date.now() - session.savedAt > 24 * 60 * 60 * 1000) {
      localStorage.removeItem(STORAGE_KEY);
      return null;
    }
    return session;
  } catch(e) { return null; }
}

function clearSession() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

        ? m.content.replace(/<DATA>.*?<\/DATA>/s, '').trim()
        : '';
      return `${role}: ${content}`;
    })
    .filter(line => line.split(': ')[1]?.length > 0)
    .join('\n');
}

let totalQuestions = 17;
let questionsAnswered = 0;

// ─── GHL FUNCTIONS ────────────────────────────────────────

async function ghlRequest(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: {
      'Authorization': `Bearer ${GHL_API_KEY}`,
      'Content-Type': 'application/json',
      'Version': '2021-07-28'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(`https://services.leadconnectorhq.com${path}`, opts);
    return await r.json();
  } catch(e) {
    console.error('GHL error:', e);
    return null;
  }
}

async function getPipelineId(callBooked = false) {
  const res = await ghlRequest(`/opportunities/pipelines?locationId=${GHL_LOCATION}`);
  if (!res || !res.pipelines) return null;
  const pipeline = res.pipelines.find(p => p.name === GHL_PIPELINE_NAME || p.name.toLowerCase().includes('lead to job'));
  if (!pipeline) return null;
  const targetStage = callBooked ? 'appointment booked' : 'new enquiry';
  const stage = pipeline.stages?.find(s => s.name.toLowerCase() === targetStage) || pipeline.stages?.[0];
  return { pipelineId: pipeline.id, stageId: stage?.id };
}

async function createOrUpdateGHLContact(data) {
  try {
    const customFields = [
      { key: 'space_type', field_value: data.spaceType || '' },
      { key: 'work_level', field_value: data.workLevel || '' },
      { key: 'floor_area', field_value: data.floorArea || '' },
      { key: 'partitions', field_value: data.partitions ? `${data.partitions}${data.partitionDetails ? ' — ' + data.partitionDetails : ''}` : '' },
      { key: 'ceilings__lighting', field_value: data.ceilings || '' },
      { key: 'fit_out_level', field_value: data.fitoutLevel || '' },
      { key: 'plumbing', field_value: data.plumbing || '' },
      { key: 'site_management', field_value: data.siteManagement || '' },
      { key: 'finish_level', field_value: data.decoration || '' },
      { key: 'timeline', field_value: data.timeline || '' },
      { key: 'budget_range', field_value: data.budget || '' },
      { key: 'decision_maker', field_value: data.decisionMaker || '' },
      { key: 'call_date_time', field_value: data.callDateTime || '' },
      { key: 'estimate_summary', field_value: [
          data.spaceType ? `Space: ${data.spaceType}` : '',
          data.location ? `Location: ${data.location}` : '',
          data.locationMultiplier && data.locationMultiplier !== 1.0 ? `Location Multiplier: ${data.locationMultiplier}x` : '',
          data.workLevel ? `Work: ${data.workLevel}` : '',
          data.floorArea ? `Area: ${data.floorArea}` : '',
          data.budget ? `Budget: ${data.budget}` : '',
          data.timeline ? `Timeline: ${data.timeline}` : '',
          data.isRetail ? 'Retail project — out of hours required' : '',
          data.penetrations ? `Penetrations: ${data.penetrations}` : '',
          data.doorOpenings ? `Door openings: ${data.doorOpenings}` : '',
        ].filter(Boolean).join(' | ') }
    ].filter(f => f.field_value !== '');

    const contactPayload = {
      locationId: GHL_LOCATION,
      firstName: data.name ? data.name.split(' ')[0] : 'Website',
      lastName: data.name ? data.name.split(' ').slice(1).join(' ') || 'Enquiry' : 'Enquiry',
      email: data.email || undefined,
      phone: data.phone || undefined,
      source: 'Lora AI Estimator',
      tags: ['lora ai', data.callBooked ? 'call booked' : 'in progress'],
      customFields
    };

    const transcript = buildTranscript();
    const noteLines = [
      '=== LORA AI ESTIMATE ENQUIRY ===',
      `Space Type: ${data.spaceType || 'Not provided'}`,
      `Location: ${data.location || 'Not provided'}`,
      `Location Multiplier: ${data.locationMultiplier || '1.0'}x`,
      `Work Level: ${data.workLevel || 'Not provided'}`,
      `Floor Area: ${data.floorArea || 'Not provided'}`,
      `Partitions: ${data.partitions || 'Not provided'}`,
      `Partition Details: ${data.partitionDetails || 'Not provided'}`,
      `Ceilings/Lighting: ${data.ceilings || 'Not provided'}`,
      `Door Openings: ${data.doorOpenings || 'Not provided'}`,
      `Penetrations: ${data.penetrations || 'Not provided'}`,
      `Flooring: ${data.flooring || 'Not provided'}`,
      `Decoration: ${data.decoration || 'Not provided'}`,
      `Fit-Out Level: ${data.fitoutLevel || 'Not provided'}`,
      `Plumbing: ${data.plumbing || 'Not provided'}`,
      `Retail Project: ${data.isRetail ? 'YES — out of hours required' : 'No'}`,
      `Out of Hours: ${data.outOfHours ? 'YES' : 'No'}`,
      `Site Management: ${data.siteManagement || 'Not provided'}`,
      `Timeline: ${data.timeline || 'Not provided'}`,
      `Budget Range: ${data.budget || 'Not provided'}`,
      `Decision Maker: ${data.decisionMaker || 'Not provided'}`,
      `Estimate Email Requested: ${data.estimateEmailRequested ? 'YES' : 'No'}`,
      `Call Booked: ${data.callBooked ? 'YES - ' + (data.callDateTime || '') : 'No'}`,
      `Stage: ${data.stage || 'qualifying'}`,
      '================================',
      '',
      '=== FULL CONVERSATION TRANSCRIPT ===',
      transcript || 'No transcript available',
      '===================================='
    ];

    if (!ghlContactId) {
      const created = await ghlRequest('/contacts/', 'POST', contactPayload);
      if (created && created.contact) {
        ghlContactId = created.contact.id;
        await ghlRequest(`/contacts/${ghlContactId}/notes`, 'POST', {
          body: noteLines.join('\n'),
          userId: ''
        });
        const pipelineInfo = await getPipelineId(data.callBooked);
        if (pipelineInfo) {
          await ghlRequest('/opportunities/', 'POST', {
            pipelineId: pipelineInfo.pipelineId,
            locationId: GHL_LOCATION,
            name: `${data.spaceType || 'Commercial'} Fit-Out — ${data.location || 'Location TBC'}`,
            pipelineStageId: pipelineInfo.stageId,
            status: 'open',
            contactId: ghlContactId,
            monetaryValue: estimateValue(data.budget)
          });
        }
        showGHLStatus('✓ Lead saved to GHL', 'success');
      }
    } else {
      const updatePayload = {
        firstName: contactPayload.firstName,
        lastName: contactPayload.lastName,
        customFields
      };
      if (data.email) updatePayload.email = data.email;
      if (data.phone) updatePayload.phone = data.phone;
      if (data.callBooked) updatePayload.tags = ['lora ai', 'call booked'];
      await ghlRequest(`/contacts/${ghlContactId}`, 'PUT', updatePayload);
      if (data.callBooked) {
        const pipelineInfo = await getPipelineId(true);
        if (pipelineInfo) {
          const opps = await ghlRequest(`/opportunities/search?location_id=${GHL_LOCATION}&contactId=${ghlContactId}`);
          const opp = opps?.opportunities?.[0];
          if (opp) {
            await ghlRequest(`/opportunities/${opp.id}`, 'PUT', {
              pipelineStageId: pipelineInfo.stageId,
              status: 'open'
            });
          }
        }
      }
      await ghlRequest(`/contacts/${ghlContactId}/notes`, 'POST', {
        body: `[UPDATE]\n${noteLines.join('\n')}`,
        userId: ''
      });
      showGHLStatus('✓ GHL updated', 'success');
    }
  } catch(e) {
    console.error('GHL sync error:', e);
    showGHLStatus('GHL sync pending', 'error');
  }
}

function estimateValue(budget) {
  const map = { 'Under £25k': 20000, '£25k–£60k': 42000, '£60k–£120k': 90000, '£120k+': 150000 };
  return map[budget] || 0;
}

function showGHLStatus(msg, type) {
  const el = document.getElementById('ghl-status');
  el.textContent = msg;
  el.className = `ghl-status show ${type}`;
  setTimeout(() => { el.className = 'ghl-status'; }, 3000);
}

// ─── QUICK REPLIES ────────────────────────────────────────
function getQuickReplies(lastMessage) {
  const msg = lastMessage.toLowerCase();
  if (msg.includes('type of space')) return ['Office', 'Shop / Retail', 'Warehouse office', 'Commercial unit'];
  if (msg.includes('located') || msg.includes('location') || msg.includes('site')) return ['Manchester', 'Bolton', 'London', 'Birmingham'];
  if (msg.includes('level of work')) return ['Light refresh', 'Partial strip-out & refit', 'Full strip-out & refit'];
  if (msg.includes('partition')) return ['Remove only', 'Add only', 'Both', 'No partitions'];
  if (msg.includes('ceiling') || msg.includes('lighting')) return ['Suspended grid', 'MF plasterboard', 'Both', 'Neither'];
  if (msg.includes('door opening') || msg.includes('alterations')) return ['Yes', 'No', 'Not sure yet'];
  if (msg.includes('penetration')) return ['None', '1–5', '6–15', '15–30', '30+'];
  if (msg.includes('flooring')) return ['Vinyl / LVT', 'Carpet tiles', 'Ceramic / tile', 'Keep existing'];
  if (msg.includes('decoration')) return ['Basic repaint', 'Full prep & finish', 'Feature finishes', 'No decoration'];
  if (msg.includes('plumbing') || msg.includes('toilet')) return ['Yes', 'No', 'Not sure yet'];
  if (msg.includes('retail') || msg.includes('pharmacy')) return ['Yes retail', 'No — office / commercial'];
  if (msg.includes('site management')) return ['Yes please', 'No, we have trades', 'Not sure yet'];
  if (msg.includes('hoping to start')) return ['Within 30 days', '30–60 days', '60–90 days', '90+ days'];
  if (msg.includes('budget range')) return ['Under £25k', '£25k–£60k', '£60k–£120k', '£120k+'];
  if (msg.includes('decision maker')) return ['Yes, I am', 'No, need sign-off', 'Joint decision'];
  if (msg.includes('email this estimate') || msg.includes('email it') || msg.includes('send it')) return ['Yes please', 'No thanks'];
  if (msg.includes('book a') || msg.includes('quick call')) return ['Yes, book a call', 'Not right now'];
  return [];
}

function showQuickReplies(replies) {
  const container = document.getElementById('quick-replies');
  container.innerHTML = '';
  replies.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = r;
    btn.onclick = () => {
      document.getElementById('user-input').value = r;
      sendMessage();
    };
    container.appendChild(btn);
  });
}

// ─── CHAT FUNCTIONS ───────────────────────────────────────
function addMessage(role, text, isHtml = false) {
  const container = document.getElementById('messages');
  if (role === 'typing') {
    const div = document.createElement('div');
    div.className = 'msg lora';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="msg-avatar">L</div>
      <div class="bubble">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return;
  }
  const existing = document.getElementById('typing-indicator');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  let inner = '';
  if (role === 'lora') {
    inner = `<div class="msg-avatar">L</div><div class="bubble">${isHtml ? text : escapeHtml(text)}</div>`;
  } else {
    inner = `<div class="bubble">${escapeHtml(text)}</div>`;
  }
  div.innerHTML = inner;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function updateProgress() {
  const pct = Math.min((questionsAnswered / totalQuestions) * 100, 100);
  document.getElementById('progress').style.width = pct + '%';
}

function extractData(responseText) {
  const match = responseText.match(/<DATA>(.*?)<\/DATA>/s);
  if (!match) return null;
  try { return JSON.parse(match[1]); } catch(e) { return null; }
}

function stripMarkdown(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/\*(.*?)\*/g, '$1')
    .replace(/__(.*?)__/g, '$1')
    .replace(/_(.*?)_/g, '$1')
    .replace(/--/g, '–')
    .trim();
}

function stripDataTag(text) {
  return text.replace(/<DATA>.*?<\/DATA>/s, '').trim();
}

function countAnswered(data) {
  const fields = ['spaceType','location','workLevel','floorArea','partitions','ceilings',
    'doorOpenings','penetrations','flooring','decoration','plumbing','siteManagement',
    'timeline','budget','decisionMaker','fitoutLevel','isRetail'];
  return fields.filter(f => data[f] !== undefined && data[f] !== '' && data[f] !== false).length;
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  if (text.toLowerCase() === 'start fresh') {
    clearSession();
    conversationHistory = [];
    collectedData = {};
    ghlContactId = null;
    questionsAnswered = 0;
    updateProgress();
    document.getElementById('messages').innerHTML = '';
    document.getElementById('quick-replies').innerHTML = '';
    init();
    return;
  }

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('quick-replies').innerHTML = '';
  document.getElementById('send-btn').disabled = true;

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  if (conversationHistory.filter(m => m.role === 'user').length === 2) {
    trackEvent('lora_engaged');
  }

  addMessage('typing');

  try {
    const response = await fetch(ANTHROPIC_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: ANTHROPIC_MODEL,
        max_tokens: 1200,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const fullText = data.content?.[0]?.text || "I'm sorry, I had a technical issue. Please try again.";

    const extracted = extractData(fullText);
    if (extracted) {
      collectedData = { ...collectedData, ...Object.fromEntries(Object.entries(extracted).filter(([,v]) => v !== '' && v !== false)) };
      questionsAnswered = countAnswered(collectedData);
      updateProgress();

      if (extracted.stage === 'pricing') trackEvent('lora_qualified', { spaceType: collectedData.spaceType, location: collectedData.location, budget: collectedData.budget });
      if (extracted.callBooked === true) trackEvent('lora_converted', { budget: collectedData.budget });

      if (questionsAnswered >= 1 || collectedData.email || collectedData.phone) {
        createOrUpdateGHLContact(collectedData);
      }
    }

    const cleanText = stripMarkdown(stripDataTag(fullText));
    conversationHistory.push({ role: 'assistant', content: fullText });
    addMessage('lora', cleanText);
    saveSession();

    const qr = getQuickReplies(cleanText);
    if (qr.length > 0) showQuickReplies(qr);

  } catch(e) {
    const existing = document.getElementById('typing-indicator');
    if (existing) existing.remove();
    addMessage('lora', 'Sorry, I had a technical issue. Please try again in a moment.');
    console.error(e);
  }

  document.getElementById('send-btn').disabled = false;
  input.focus();
}

// ─── INIT ─────────────────────────────────────────────────
async function init() {
  trackEvent('lora_opened');

  const savedSession = loadSession();
  if (savedSession && savedSession.conversationHistory.length > 2) {
    conversationHistory = savedSession.conversationHistory;
    collectedData = savedSession.collectedData;
    ghlContactId = savedSession.ghlContactId;
    questionsAnswered = savedSession.questionsAnswered;
    updateProgress();

    for (const msg of conversationHistory) {
      if (msg.role === 'user' && msg.content !== 'Hello') {
        addMessage('user', msg.content);
      } else if (msg.role === 'assistant') {
        const clean = stripMarkdown(stripDataTag(msg.content));
        if (clean.length > 0) addMessage('lora', clean);
      }
    }

    addMessage('lora', "Welcome back! 👋 I've restored your previous estimate — we can carry on from where we left off. What would you like to do next?");
    showQuickReplies(['Continue estimate', 'Start fresh']);
    return;
  }

  addMessage('typing');
  conversationHistory = [{ role: 'user', content: 'Hello' }];

  try {
    const response = await fetch(ANTHROPIC_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: ANTHROPIC_MODEL,
        max_tokens: 1200,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const fullText = data.content?.[0]?.text || "Hi! 👋 Get a free instant estimate for your commercial fit-out in under 2 minutes. What type of space are we working with — office, shop, warehouse, or something else?";
    const cleanText = stripMarkdown(stripDataTag(fullText));
    conversationHistory.push({ role: 'assistant', content: fullText });
    addMessage('lora', cleanText);
    showQuickReplies(['Office', 'Shop / Retail', 'Warehouse office', 'Commercial unit']);

  } catch(e) {
    const existing = document.getElementById('typing-indicator');
    if (existing) existing.remove();
    addMessage('lora', "Hi! 👋 Get a free instant estimate for your commercial fit-out in under 2 minutes. What type of space are we working with — office, shop, warehouse, or something else?");
    showQuickReplies(['Office', 'Shop / Retail', 'Warehouse office', 'Commercial unit']);
  }
}

document.getElementById('user-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

init();
</script>
