// ─── GHL FUNCTIONS ────────────────────────────────────────

async function ghlRequest(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: {
      'Authorization': `Bearer ${GHL_API_KEY}`,
      'Content-Type': 'application/json',
      'Version': '2021-07-28'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(`https://services.leadconnectorhq.com${path}`, opts);
    return await r.json();
  } catch(e) {
    console.error('GHL error:', e);
    return null;
  }
}

async function getPipelineId(callBooked = false) {
  const res = await ghlRequest(`/opportunities/pipelines?locationId=${GHL_LOCATION}`);
  if (!res || !res.pipelines) return null;
  const pipeline = res.pipelines.find(p => p.name === GHL_PIPELINE_NAME) || res.pipelines[0];
  if (!pipeline) return null;
  const targetStage = callBooked ? 'booked' : 'new';
  const stage = pipeline.stages?.find(s => s.name.toLowerCase().includes(targetStage)) || pipeline.stages?.[0];
  return { pipelineId: pipeline.id, stageId: stage?.id };
}

async function createOrUpdateGHLContact(data) {
  try {
    const customFields = [
      { key: 'trade', field_value: data.trade || '' },
      { key: 'location', field_value: data.location || '' },
      { key: 'staff_count', field_value: data.staffCount || '' },
      { key: 'avg_job_value', field_value: data.avgJobValue || '' },
      { key: 'jobs_per_month', field_value: data.jobsPerMonth || '' },
      { key: 'lead_source', field_value: data.leadSource || '' },
      { key: 'biggest_problem', field_value: data.biggestProblem || '' },
      { key: 'has_crm', field_value: data.hasCRM || '' },
      { key: 'budget', field_value: data.budget || '' },
      { key: 'recommended_package', field_value: data.recommendedPackage || '' },
    ].filter(f => f.field_value !== '');

    const contactPayload = {
      locationId: GHL_LOCATION,
      firstName: data.name ? data.name.split(' ')[0] : 'Website',
      lastName: data.name ? data.name.split(' ').slice(1).join(' ') || 'Enquiry' : 'Enquiry',
      email: data.email || undefined,
      phone: data.phone || undefined,
      source: 'Ava AI Growth Consultant',
      tags: ['ava ai', data.callBooked ? 'call booked' : 'in progress'],
      customFields
    };

    const noteLines = [
      '=== AVA AI GROWTH ENQUIRY ===',
      `Trade: ${data.trade || 'Not provided'}`,
      `Location: ${data.location || 'Not provided'}`,
      `Staff Count: ${data.staffCount || 'Not provided'}`,
      `Avg Job Value: ${data.avgJobValue || 'Not provided'}`,
      `Jobs/Month: ${data.jobsPerMonth || 'Not provided'}`,
      `Lead Source: ${data.leadSource || 'Not provided'}`,
      `Biggest Problem: ${data.biggestProblem || 'Not provided'}`,
      `Has CRM: ${data.hasCRM || 'Not provided'}`,
      `Budget: ${data.budget || 'Not provided'}`,
      `Recommended Package: ${data.recommendedPackage || 'Not provided'}`,
      `Call Booked: ${data.callBooked ? 'YES - ' + (data.callDateTime || '') : 'No'}`,
      `Stage: ${data.stage || 'qualifying'}`,
      '=============================='
    ];

    if (!ghlContactId) {
      const created = await ghlRequest('/contacts/', 'POST', contactPayload);
      if (created && created.contact) {
        ghlContactId = created.contact.id;
        await ghlRequest(`/contacts/${ghlContactId}/notes`, 'POST', {
          body: noteLines.join('\n'),
          userId: ''
        });
        const pipelineInfo = await getPipelineId(data.callBooked);
        if (pipelineInfo) {
          await ghlRequest('/opportunities/', 'POST', {
            pipelineId: pipelineInfo.pipelineId,
            locationId: GHL_LOCATION,
            name: `${data.trade || 'Trade'} Enquiry — ${data.location || 'Unknown Area'}`,
            pipelineStageId: pipelineInfo.stageId,
            status: 'open',
            contactId: ghlContactId,
          });
        }
        showGHLStatus('✓ Lead saved', 'success');
      }
    } else {
      const updatePayload = {
        firstName: contactPayload.firstName,
        lastName: contactPayload.lastName,
        customFields
      };
      if (data.email) updatePayload.email = data.email;
      if (data.phone) updatePayload.phone = data.phone;
      if (data.callBooked) updatePayload.tags = ['ava ai', 'call booked'];
      await ghlRequest(`/contacts/${ghlContactId}`, 'PUT', updatePayload);
      await ghlRequest(`/contacts/${ghlContactId}/notes`, 'POST', {
        body: `[UPDATE]\n${noteLines.join('\n')}`,
        userId: ''
      });
      showGHLStatus('✓ Updated', 'success');
    }
  } catch(e) {
    console.error('GHL sync error:', e);
    showGHLStatus('Sync pending', 'error');
  }

// ─── CHAT FUNCTIONS ───────────────────────────────────────
function addMessage(role, text) {
  const container = document.getElementById('messages');

  if (role === 'typing') {
    const div = document.createElement('div');
    div.className = 'msg ava';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="msg-avatar">A</div>
      <div class="bubble">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return;
  }

  const existing = document.getElementById('typing-indicator');
  if (existing) existing.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;

  if (role === 'ava') {
    div.innerHTML = `<div class="msg-avatar">A</div><div class="bubble">${escapeHtml(text)}</div>`;
  } else {
    div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  }

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function updateProgress() {
  const pct = Math.min((questionsAnswered / totalQuestions) * 100, 100);
  document.getElementById('progress').style.width = pct + '%';
}

function extractData(responseText) {
  const match = responseText.match(/<DATA>(.*?)<\/DATA>/s);
  if (!match) return null;
  try { return JSON.parse(match[1]); } catch(e) { return null; }
}

function stripDataTag(text) {
  return text.replace(/<DATA>.*?<\/DATA>/s, '').trim();
}

function countAnswered(data) {
  const fields = ['trade','location','staffCount','avgJobValue','jobsPerMonth','leadSource','biggestProblem','hasCRM','decisionMaker','budget'];
  return fields.filter(f => data[f] && data[f].length > 0).length;
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('quick-replies').innerHTML = '';
  document.getElementById('send-btn').disabled = true;

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  addMessage('typing');

  try {
    const response = await fetch(ANTHROPIC_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: ANTHROPIC_MODEL,
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const fullText = data.content?.[0]?.text || "I'm sorry, I had a technical issue. Please try again.";

    const extracted = extractData(fullText);
    if (extracted) {
      collectedData = { ...collectedData, ...Object.fromEntries(Object.entries(extracted).filter(([,v]) => v !== '' && v !== false)) };
      questionsAnswered = countAnswered(collectedData);
      updateProgress();
      if (questionsAnswered >= 1 || collectedData.email || collectedData.phone) {
        createOrUpdateGHLContact(collectedData);
      }
    }

    const cleanText = stripDataTag(fullText);
    conversationHistory.push({ role: 'assistant', content: fullText });
    addMessage('ava', cleanText);

    const qr = getQuickReplies(cleanText);
    if (qr.length > 0) showQuickReplies(qr);

  } catch(e) {
    const existing = document.getElementById('typing-indicator');
    if (existing) existing.remove();
    addMessage('ava', 'Sorry, I had a technical issue. Please try again in a moment.');
    console.error(e);
  }

  document.getElementById('send-btn').disabled = false;
  input.focus();
}

// ─── INIT ─────────────────────────────────────────────────
async function init() {
  addMessage('typing');
  conversationHistory = [{ role: 'user', content: 'Hello' }];

  try {
    const response = await fetch(ANTHROPIC_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: ANTHROPIC_MODEL,
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const fullText = data.content?.[0]?.text || "Hi! I'm Ava from Construction Media. How can I help you today?";
    const cleanText = stripDataTag(fullText);
    conversationHistory.push({ role: 'assistant', content: fullText });
    addMessage('ava', cleanText);
    const qr = getQuickReplies(cleanText);
    if (qr.length > 0) showQuickReplies(qr);
  } catch(e) {
    const existing = document.getElementById('typing-indicator');
    if (existing) existing.remove();
    addMessage('ava', "Hi — I'm Ava, Construction Media's growth consultant. I help established construction and trade businesses build predictable, qualified pipelines. To get started — what trade are you in?");
    showQuickReplies(['Scaffolding', 'Shopfitting', 'Office fit-out', 'Builder']);
  }
}

document.getElementById('user-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

init();
</script>
