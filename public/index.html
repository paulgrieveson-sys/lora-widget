async function ghlRequest(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: {
      'Authorization': `Bearer ${GHL_API_KEY}`,
      'Content-Type': 'application/json',
      'Version': '2021-07-28'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(`https://services.leadconnectorhq.com${path}`, opts);
    return await r.json();
  } catch(e) {
    console.error('GHL error:', e);
    return null;
  }
}

async function getPipelineId(callBooked = false) {
  const res = await ghlRequest(`/opportunities/pipelines?locationId=${GHL_LOCATION}`);
  if (!res || !res.pipelines) return null;
  const pipeline = res.pipelines.find(p => p.name === GHL_PIPELINE_NAME || p.name.toLowerCase().includes('lead to job'));
  if (!pipeline) return null;
  const targetStage = callBooked ? 'appointment booked' : 'new enquiry';
  const stage = pipeline.stages?.find(s => s.name.toLowerCase() === targetStage) || pipeline.stages?.[0];
  return { pipelineId: pipeline.id, stageId: stage?.id };
}

      email: data.email || undefined,
      phone: data.phone || undefined,
      source: 'Lora AI Estimator',
      tags: ['lora ai', data.callBooked ? 'call booked' : 'in progress'],
      customFields
    };

    // Build notes
    const noteLines = [
      '=== LORA AI ESTIMATE ENQUIRY ===',
      `Space Type: ${data.spaceType || 'Not provided'}`,
      `Standalone: ${data.standalone || 'Not provided'}`,
      `Work Level: ${data.workLevel || 'Not provided'}`,
      `Floor Area: ${data.floorArea || 'Not provided'}`,
      `Partitions: ${data.partitions || 'Not provided'}`,
      `Partition Details: ${data.partitionDetails || 'Not provided'}`,
      `Ceilings/Lighting: ${data.ceilings || 'Not provided'}`,
      `Fit-Out Level: ${data.fitoutLevel || 'Not provided'}`,
      `Plumbing: ${data.plumbing || 'Not provided'}`,
      `Site Management: ${data.siteManagement || 'Not provided'}`,
      `Finish Level: ${data.finishLevel || 'Not provided'}`,
      `Timeline: ${data.timeline || 'Not provided'}`,
      `Budget Range: ${data.budget || 'Not provided'}`,
      `Decision Maker: ${data.decisionMaker || 'Not provided'}`,
      `Call Booked: ${data.callBooked ? 'YES - ' + (data.callDateTime || '') : 'No'}`,
      `Stage: ${data.stage || 'qualifying'}`,
      '================================'
    ];

    if (!ghlContactId) {
      // Create new contact
      const created = await ghlRequest('/contacts/', 'POST', contactPayload);
      console.log('GHL create response:', JSON.stringify(created));
      if (created && created.contact) {
        ghlContactId = created.contact.id;
        // Add note
        await ghlRequest(`/contacts/${ghlContactId}/notes`, 'POST', {
          body: noteLines.join('\n'),
          userId: ''
        });
        // Add to pipeline
        const pipelineInfo = await getPipelineId(data.callBooked);
        if (pipelineInfo) {
          await ghlRequest('/opportunities/', 'POST', {
            pipelineId: pipelineInfo.pipelineId,
            locationId: GHL_LOCATION,
            name: `${data.spaceType || 'Commercial'} Fit-Out Enquiry`,
            pipelineStageId: pipelineInfo.stageId,
            status: 'open',
            contactId: ghlContactId,
            monetaryValue: estimateValue(data.budget)
          });
        }
        showGHLStatus('✓ Lead saved to GHL', 'success');
      }
    } else {
      // Update existing contact — GHL PUT only accepts specific fields
      const updatePayload = {
        firstName: contactPayload.firstName,
        lastName: contactPayload.lastName,
        customFields
      };
      if (data.email) updatePayload.email = data.email;
      if (data.phone) updatePayload.phone = data.phone;
      if (data.callBooked) updatePayload.tags = ['lora ai', 'call booked'];

      await ghlRequest(`/contacts/${ghlContactId}`, 'PUT', updatePayload);
      // Move pipeline stage to Appointment booked if call is booked
      if (data.callBooked) {
        const pipelineInfo = await getPipelineId(true);
        if (pipelineInfo) {
          const opps = await ghlRequest(`/opportunities/search?location_id=${GHL_LOCATION}&contactId=${ghlContactId}`);
          const opp = opps?.opportunities?.[0];
          if (opp) {
            await ghlRequest(`/opportunities/${opp.id}`, 'PUT', {
              pipelineStageId: pipelineInfo.stageId,
              status: 'open'
            });
          }
        }
      }
      // Add updated note
      await ghlRequest(`/contacts/${ghlContactId}/notes`, 'POST', {
        body: `[UPDATE]\n${noteLines.join('\n')}`,
        userId: ''
      });
      showGHLStatus('✓ GHL updated', 'success');
    }
  } catch(e) {
    console.error('GHL sync error:', e);
    showGHLStatus('GHL sync pending', 'error');
  }
}

function estimateValue(budget) {
  const map = { 'Under £25k': 20000, '£25k–£60k': 42000, '£60k–£120k': 90000, '£120k+': 150000 };
  return map[budget] || 0;
}

function showGHLStatus(msg, type) {
  const el = document.getElementById('ghl-status');
  el.textContent = msg;
  el.className = `ghl-status show ${type}`;
  setTimeout(() => { el.className = 'ghl-status'; }, 3000);
}

// ─── QUICK REPLY SUGGESTIONS ──────────────────────────────
function getQuickReplies(lastMessage) {
  const msg = lastMessage.toLowerCase();
  if (msg.includes('type of space')) return ['Office', 'Shop', 'Warehouse office', 'Commercial unit'];
  if (msg.includes('standalone')) return ['Standalone building', 'Part of a complex'];
  if (msg.includes('level of work')) return ['Light refresh', 'Partial strip-out & refit', 'Full strip-out & refit'];
  if (msg.includes('partition')) return ['Remove only', 'Add only', 'Both', 'No partitions'];
  if (msg.includes('ceiling') || msg.includes('lighting')) return ['New ceilings', 'New lighting', 'Both', 'Neither'];
  if (msg.includes('fit-out level')) return ['None', 'Light', 'Full'];
  if (msg.includes('plumbing') || msg.includes('toilet')) return ['Yes', 'No', 'Not sure yet'];
  if (msg.includes('site management')) return ['Yes please', 'No, we have trades', 'Not sure yet'];
  if (msg.includes('finish level')) return ['Functional', 'Professional / Modern', 'High-End / Premium'];
  if (msg.includes('hoping to start')) return ['Within 30 days', '30–60 days', '60–90 days', '90+ days'];
  if (msg.includes('budget range')) return ['Under £25k', '£25k–£60k', '£60k–£120k', '£120k+'];
  if (msg.includes('decision maker')) return ['Yes, I am', 'No, I\'ll need sign-off', 'Joint decision'];
  if (msg.includes('book a') || msg.includes('quick call')) return ['Yes, book a call', 'Not right now'];
  return [];
}

function showQuickReplies(replies) {
  const container = document.getElementById('quick-replies');
  container.innerHTML = '';
  replies.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = r;
    btn.onclick = () => {
      document.getElementById('user-input').value = r;
      sendMessage();
    };
    container.appendChild(btn);
  });
}

// ─── CHAT FUNCTIONS ───────────────────────────────────────

function addMessage(role, text, isHtml = false) {
  const container = document.getElementById('messages');

  if (role === 'typing') {
    const div = document.createElement('div');
    div.className = 'msg lora';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="msg-avatar">L</div>
      <div class="bubble">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return;
  }

  const existing = document.getElementById('typing-indicator');
  if (existing) existing.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;

  let inner = '';
  if (role === 'lora') {
    inner = `<div class="msg-avatar">L</div><div class="bubble">${isHtml ? text : escapeHtml(text)}</div>`;
  } else {
    inner = `<div class="bubble">${escapeHtml(text)}</div>`;
  }

  div.innerHTML = inner;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function updateProgress() {
  const pct = Math.min((questionsAnswered / totalQuestions) * 100, 100);
  document.getElementById('progress').style.width = pct + '%';
}

function extractData(responseText) {
  const match = responseText.match(/<DATA>(.*?)<\/DATA>/s);
  if (!match) return null;
  try {
    return JSON.parse(match[1]);
  } catch(e) {
    return null;
  }
}

function stripDataTag(text) {
  return text.replace(/<DATA>.*?<\/DATA>/s, '').trim();
}

function countAnswered(data) {
  const fields = ['spaceType','standalone','workLevel','floorArea','partitions','ceilings',
    'fitoutLevel','plumbing','siteManagement','finishLevel','timeline','budget','decisionMaker'];
  return fields.filter(f => data[f] && data[f].length > 0).length;
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('quick-replies').innerHTML = '';
  document.getElementById('send-btn').disabled = true;

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  addMessage('typing');

  try {
    const response = await fetch(ANTHROPIC_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: ANTHROPIC_MODEL,
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const fullText = data.content?.[0]?.text || "I'm sorry, I had a technical issue. Please try again.";

    // Extract structured data
    const extracted = extractData(fullText);
    if (extracted) {
      collectedData = { ...collectedData, ...Object.fromEntries(Object.entries(extracted).filter(([,v]) => v !== '' && v !== false)) };
      questionsAnswered = countAnswered(collectedData);
      updateProgress();

      // Progressive save to GHL after key milestones
      if (questionsAnswered >= 1 || collectedData.email || collectedData.phone) {
        createOrUpdateGHLContact(collectedData);
      }
    }

    const cleanText = stripDataTag(fullText);
    conversationHistory.push({ role: 'assistant', content: fullText });

    addMessage('lora', cleanText);

    // Show quick replies
    const qr = getQuickReplies(cleanText);
    if (qr.length > 0) showQuickReplies(qr);

  } catch(e) {
    const existing = document.getElementById('typing-indicator');
    if (existing) existing.remove();
    addMessage('lora', 'Sorry, I had a technical issue. Please try again in a moment.');
    console.error(e);
  }

  document.getElementById('send-btn').disabled = false;
  input.focus();
}

// ─── INIT ─────────────────────────────────────────────────

async function init() {
  addMessage('typing');
  conversationHistory = [{ role: 'user', content: 'Hello' }];

  try {
    const response = await fetch(ANTHROPIC_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: ANTHROPIC_MODEL,
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const fullText = data.content?.[0]?.text || "Hi! I'm Lora from JDCM. How can I help you today?";
    const cleanText = stripDataTag(fullText);
    conversationHistory.push({ role: 'assistant', content: fullText });
    addMessage('lora', cleanText);
    const qr = getQuickReplies(cleanText);
    if (qr.length > 0) showQuickReplies(qr);
  } catch(e) {
    const existing = document.getElementById('typing-indicator');
    if (existing) existing.remove();
    addMessage('lora', "Hi there! I'm Lora, JDCM's estimating consultant. I'm here to help you get a rough guide price for your commercial fit-out or refurbishment project. To get started — what type of space is it? An office, shop, warehouse, or something else?");
  }
}

// Enter to send
document.getElementById('user-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

init();
</script>
