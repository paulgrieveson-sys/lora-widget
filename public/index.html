const STORAGE_KEY = 'ava_cm_session';

function saveSession() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      conversationHistory,
      collectedData,
      ghlContactId,
      questionsAnswered,
      savedAt: Date.now()
    }));
  } catch(e) { console.log('Session save failed:', e); }
}

function loadSession() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return null;
    const session = JSON.parse(saved);
    if (Date.now() - session.savedAt > 24 * 60 * 60 * 1000) {
      localStorage.removeItem(STORAGE_KEY);
      return null;
    }
    return session;
  } catch(e) { return null; }
}

function clearSession() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

function buildTranscript() {
  return conversationHistory
    .filter(m => m.role !== 'system')
    .map(m => {
      const role = m.role === 'user' ? 'Visitor' : 'Ava';
      const content = typeof m.content === 'string'
        ? m.content.replace(/<DATA>.*?<\/DATA>/s, '').trim()
        : '';
      return `${role}: ${content}`;
    })
    .filter(line => line.split(': ')[1]?.length > 0)
    .join('\n');
}

async function ghlRequest(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: {
      'Authorization': `Bearer ${GHL_API_KEY}`,
      'Content-Type': 'application/json',
      'Version': '2021-07-28'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(`https://services.leadconnectorhq.com${path}`, opts);
    return await r.json();
  } catch(e) {
    console.error('GHL error:', e);
    return null;
  }
}

async function getPipelineId(callBooked = false) {
  const res = await ghlRequest(`/opportunities/pipelines?locationId=${GHL_LOCATION}`);
  if (!res || !res.pipelines) return null;
  const pipeline = res.pipelines.find(p => p.name === GHL_PIPELINE_NAME) || res.pipelines[0];
  if (!pipeline) return null;
  const targetStage = callBooked ? 'booked' : 'new';
  const stage = pipeline.stages?.find(s => s.name.toLowerCase().includes(targetStage)) || pipeline.stages?.[0];
  return { pipelineId: pipeline.id, stageId: stage?.id };
}

    };

    const transcript = buildTranscript();
    const noteLines = [
      '=== AVA AI GROWTH ENQUIRY ===',
      `Trade: ${data.trade || 'Not provided'}`,
      `Location: ${data.location || 'Not provided'}`,
      `Staff Count: ${data.staffCount || 'Not provided'}`,
      `Avg Job Value: ${data.avgJobValue || 'Not provided'}`,
      `Jobs/Month: ${data.jobsPerMonth || 'Not provided'}`,
      `Lead Source: ${data.leadSource || 'Not provided'}`,
      `Biggest Problem: ${data.biggestProblem || 'Not provided'}`,
      `Has CRM: ${data.hasCRM || 'Not provided'}`,
      `Budget: ${data.budget || 'Not provided'}`,
      `Recommended Package: ${data.recommendedPackage || 'Not provided'}`,
      `Call Booked: ${data.callBooked ? 'YES - ' + (data.callDateTime || '') : 'No'}`,
      `Stage: ${data.stage || 'qualifying'}`,
      '==============================',
      '',
      '=== FULL CONVERSATION TRANSCRIPT ===',
      transcript || 'No transcript available',
      '===================================='
    ];

    if (!ghlContactId) {
      const created = await ghlRequest('/contacts/', 'POST', contactPayload);
      if (created && created.contact) {
        ghlContactId = created.contact.id;
        await ghlRequest(`/contacts/${ghlContactId}/notes`, 'POST', {
          body: noteLines.join('\n'),
          userId: ''
        });
        const pipelineInfo = await getPipelineId(data.callBooked);
        if (pipelineInfo) {
          await ghlRequest('/opportunities/', 'POST', {
            pipelineId: pipelineInfo.pipelineId,
            locationId: GHL_LOCATION,
            name: `${data.trade || 'Trade'} Enquiry — ${data.location || 'Unknown Area'}`,
            pipelineStageId: pipelineInfo.stageId,
            status: 'open',
            contactId: ghlContactId,
          });
        }
        showGHLStatus('✓ Lead saved', 'success');
      }
    } else {
      const updatePayload = {
        firstName: contactPayload.firstName,
        lastName: contactPayload.lastName,
        customFields
      };
      if (data.email) updatePayload.email = data.email;
      if (data.phone) updatePayload.phone = data.phone;
      if (data.callBooked) updatePayload.tags = ['ava ai', 'call booked'];
      await ghlRequest(`/contacts/${ghlContactId}`, 'PUT', updatePayload);
      await ghlRequest(`/contacts/${ghlContactId}/notes`, 'POST', {
        body: `[UPDATE]\n${noteLines.join('\n')}`,
        userId: ''
      });
      showGHLStatus('✓ Updated', 'success');
    }
  } catch(e) {
    console.error('GHL sync error:', e);
    showGHLStatus('Sync pending', 'error');
  }
}

function showGHLStatus(msg, type) {
  const el = document.getElementById('ghl-status');
  el.textContent = msg;
  el.className = `ghl-status show ${type}`;
  setTimeout(() => { el.className = 'ghl-status'; }, 3000);
}

// ─── QUICK REPLIES ────────────────────────────────────────
function getQuickReplies(lastMessage) {
  const msg = lastMessage.toLowerCase();
  if (msg.includes('trade')) return ['Scaffolding', 'Shopfitting', 'Office fit-out', 'Builder', 'Plumber', 'Roofer'];
  if (msg.includes('based') || msg.includes('whereabouts')) return ['Greater Manchester', 'Cheshire', 'Lancashire', 'Yorkshire'];
  if (msg.includes('team') || msg.includes('business') || msg.includes('yourself')) return ['Just me', '2-5 lads', '6-15 staff', '15+ staff'];
  if (msg.includes('job worth') || msg.includes('typical job')) return ['Under £1k', '£1k–£5k', '£5k–£20k', '£20k+'];
  if (msg.includes('jobs') && msg.includes('month')) return ['1-3', '4-8', '9-15', '15+'];
  if (msg.includes('getting') && msg.includes('work')) return ['Word of mouth', 'Google', 'Social media', 'Lead agencies', 'Mix of everything'];
  if (msg.includes('miss') && msg.includes('call')) return ['Nothing follows up', 'I call back when I can', 'We have a system'];
  if (msg.includes('quoting') || msg.includes('time waster')) return ['Yeah happens a lot', 'Sometimes', 'Not really'];
  if (msg.includes('google review')) return ['Under 10', '10-30', '30-50', '50+'];
  if (msg.includes('enquiry') && msg.includes('website')) return ['Nothing until morning', 'I try to call back same day', 'We have automation'];
  if (msg.includes('decision') || msg.includes('decisions')) return ['Yes, just me', 'Need to speak to partner', 'Business partner involved'];
  if (msg.includes('budget') || msg.includes('thinking')) return ['Under £500', '£500–£1,200', '£1,200–£2,000', '£2,000–£3,500', '£3,500+'];
  if (msg.includes('strategy call') || msg.includes('get one booked')) return ['Yes, let\'s book it', 'Not right now'];
  return [];
}

function showQuickReplies(replies) {
  const container = document.getElementById('quick-replies');
  container.innerHTML = '';
  replies.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = r;
    btn.onclick = () => {
      document.getElementById('user-input').value = r;
      sendMessage();
    };
    container.appendChild(btn);
  });
}

// ─── CHAT FUNCTIONS ───────────────────────────────────────
function addMessage(role, text) {
  const container = document.getElementById('messages');

  if (role === 'typing') {
    const div = document.createElement('div');
    div.className = 'msg ava';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="msg-avatar">A</div>
      <div class="bubble">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return;
  }

  const existing = document.getElementById('typing-indicator');
  if (existing) existing.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;

  if (role === 'ava') {
    div.innerHTML = `<div class="msg-avatar">A</div><div class="bubble">${escapeHtml(text)}</div>`;
  } else {
    div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  }

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function updateProgress() {
  const pct = Math.min((questionsAnswered / totalQuestions) * 100, 100);
  document.getElementById('progress').style.width = pct + '%';
}

function extractData(responseText) {
  const match = responseText.match(/<DATA>(.*?)<\/DATA>/s);
  if (!match) return null;
  try { return JSON.parse(match[1]); } catch(e) { return null; }
}

function stripDataTag(text) {
  return text.replace(/<DATA>.*?<\/DATA>/s, '').trim();
}

function countAnswered(data) {
  const fields = ['trade','location','staffCount','avgJobValue','jobsPerMonth','leadSource','biggestProblem','hasCRM','decisionMaker','budget'];
  return fields.filter(f => data[f] && data[f].length > 0).length;
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  // Handle start fresh
  if (text.toLowerCase() === 'start fresh') {
    clearSession();
    conversationHistory = [];
    collectedData = {};
    ghlContactId = null;
    questionsAnswered = 0;
    updateProgress();
    document.getElementById('messages').innerHTML = '';
    document.getElementById('quick-replies').innerHTML = '';
    init();
    return;
  }

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('quick-replies').innerHTML = '';
  document.getElementById('send-btn').disabled = true;

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  // Track first message
  if (conversationHistory.filter(m => m.role === 'user').length === 2) {
    trackEvent('ava_engaged');
  }

  addMessage('typing');

  try {
    const response = await fetch(ANTHROPIC_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: ANTHROPIC_MODEL,
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const fullText = data.content?.[0]?.text || "I'm sorry, I had a technical issue. Please try again.";

    const extracted = extractData(fullText);
    if (extracted) {
      collectedData = { ...collectedData, ...Object.fromEntries(Object.entries(extracted).filter(([,v]) => v !== '' && v !== false)) };
      questionsAnswered = countAnswered(collectedData);
      updateProgress();

      // Track key stages
      if (extracted.stage === 'pricing') trackEvent('ava_qualified', { trade: collectedData.trade, location: collectedData.location });
      if (extracted.callBooked === true) trackEvent('ava_converted', { package: collectedData.recommendedPackage });

      if (questionsAnswered >= 1 || collectedData.email || collectedData.phone) {
        createOrUpdateGHLContact(collectedData);
      }
    }

    const cleanText = stripMarkdown(stripDataTag(fullText));
    conversationHistory.push({ role: 'assistant', content: fullText });
    addMessage('ava', cleanText);

    // Save session
    saveSession();

    const qr = getQuickReplies(cleanText);
    if (qr.length > 0) showQuickReplies(qr);

  } catch(e) {
    const existing = document.getElementById('typing-indicator');
    if (existing) existing.remove();
    addMessage('ava', 'Sorry, I had a technical issue. Please try again in a moment.');
    console.error(e);
  }

  document.getElementById('send-btn').disabled = false;
  input.focus();
}

// ─── INIT ─────────────────────────────────────────────────
function stripMarkdown(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/\*(.*?)\*/g, '$1')
    .replace(/__(.*?)__/g, '$1')
    .replace(/_(.*?)_/g, '$1')
    .trim();
}

function getTimeOfDay() {
  const hour = new Date().getHours();
  if (hour < 12) return 'morning';
  if (hour < 17) return 'afternoon';
  return 'evening';
}

async function init() {
  trackEvent('ava_opened');

  // Check for saved session
  const savedSession = loadSession();
  if (savedSession && savedSession.conversationHistory.length > 2) {
    conversationHistory = savedSession.conversationHistory;
    collectedData = savedSession.collectedData;
    ghlContactId = savedSession.ghlContactId;
    questionsAnswered = savedSession.questionsAnswered;
    updateProgress();

    // Replay messages visually
    for (const msg of conversationHistory) {
      const isHello = msg.content?.includes('Hello (it is currently');
      if (msg.role === 'user' && !isHello) {
        addMessage('user', msg.content);
      } else if (msg.role === 'assistant') {
        const clean = stripMarkdown(stripDataTag(msg.content));
        if (clean.length > 0) addMessage('ava', clean);
      }
    }

    addMessage('ava', "Good to have you back! 👋 I've saved your details from last time — we can pick up where we left off. What would you like to do?");
    showQuickReplies(['Continue', 'Start fresh']);
    return;
  }

  addMessage('typing');
  const timeOfDay = getTimeOfDay();
  conversationHistory = [{ role: 'user', content: `Hello (it is currently ${timeOfDay})` }];

  try {
    const response = await fetch(ANTHROPIC_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: ANTHROPIC_MODEL,
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const fullText = data.content?.[0]?.text || `Good ${timeOfDay} — I'm Ava from Construction Media. We help trade businesses stop chasing work and start getting found properly. Quick few questions to see if we can help — what trade are you in?`;
    const cleanText = stripMarkdown(stripDataTag(fullText));
    conversationHistory.push({ role: 'assistant', content: fullText });
    addMessage('ava', cleanText);
    const qr = getQuickReplies(cleanText);
    if (qr.length > 0) showQuickReplies(qr);
  } catch(e) {
    const existing = document.getElementById('typing-indicator');
    if (existing) existing.remove();
    addMessage('ava', "Hi — I'm Ava, Construction Media's growth consultant. I help established construction and trade businesses build predictable, qualified pipelines. To get started — what trade are you in?");
    showQuickReplies(['Scaffolding', 'Shopfitting', 'Office fit-out', 'Builder']);
  }
}

document.getElementById('user-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

init();
</script>
